# Example secrets.toml — host-scoped credentials for web_fetch.
# Store this at the WebDAV root path (same level as rockbot/ directory).
# The LLM references secrets by key name (e.g. "secret:gitea_token") —
# it never sees real values. The harness filters by target host before injection.
#
# Each [[secrets]] entry binds a key to a specific host. A web_fetch to
# https://site-a.com only receives secrets scoped to that host.

[[secrets]]
host = "https://gitea.example.com"
key = "gitea_token"
value = "EDITME-your-gitea-token"

[[secrets]]
host = "https://api.github.com"
key = "github_pat"
value = "EDITME-your-github-personal-access-token"

[[secrets]]
host = "https://gitlab.example.com"
key = "gitlab_token"
value = "EDITME-your-gitlab-token"

# Multiple secrets can share the same host
[[secrets]]
host = "https://gitea.example.com"
key = "gitea_webhook_secret"
value = "EDITME-your-webhook-secret"

[[secrets]]
host = "https://api.example.com"
key = "service_api_key"
value = "EDITME-your-service-api-key"
