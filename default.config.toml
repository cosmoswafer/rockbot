[[chat_providers]]
name = "openrouter"
api_key = ""
base_url = "https://openrouter.ai/api/v1"
basecf_url = ""
chat_path = "/chat/completions"

[chat_providers.models]
gpt = "openai/gpt-oss-120b:online"
qwen = "qwen/qwen3.7-plus"
minimax = "minimax/minimax-m3"

[[chat_providers]]
name = "deepseek"
api_key = ""
base_url = "https://api.deepseek.com/v1"

[chat_providers.models]
flash = "deepseek-v4-flash"
pro = "deepseek-v4-pro"

[[image_providers]]
name = "openrouter"
api_key = ""
base_url = "https://openrouter.ai/api/v1"
basecf_url = ""
draw_path = "/images/generations"

[image_providers.models]
seedream = "bytedance-seed/seedream-4.5"
banana = "google/gemini-3.1-flash-image-preview"

[[image_providers]]
name = "fal"
api_key = ""
base_url = "https://queue.fal.run"

[image_providers.models]
seedream = "fal-ai/bytedance/seedream/v4.5/text-to-image"
gptimage = "openai/gpt-image-2"
gptimage_edit = "openai/gpt-image-2/edit"
grok_edit = "xai/grok-imagine-image/quality/edit"

[image_model]
default_provider = "fal"
default_text_model = "seedream"
default_edit_model = "fal-ai/nano-banana-pro/edit"
default_quality = "medium"
default_output_format = "png"
default_num_images = 1
default_image_size = "portrait_2_3"
default_image_size_tier = "4K"

[rocketchat.model]
default_provider = "openrouter"
default_model = "gpt"
max_history_size = 18
max_text_length = 50000
max_iterations = 28
max_summary_chars = 4000
max_soul_chars = 2000
summary_days = 3
memory_ttl_secs = 600
persist_interval_secs = 120
max_context_bytes = 2_000_000
max_attachment_bytes = 25_000_000

[rocketchat.server]
url = "localhost"
username = ""
password = ""

[webdav]
dav_path = "/remote.php/dav"
