[rocketchat.model]
default_provider = "openrouter"
default_model = "gpt"
max_history_size = 12
max_text_length = 50000
max_iterations = 8
max_summary_chars = 8000
max_soul_chars = 2000
summary_days = 7
memory_ttl_secs = 300
persist_interval_secs = 60

[rocketchat.server]
url = "localhost"
username = ""
password = ""
debug = false

[image_model]
default_provider = "fal"
default_model = "seedream"
